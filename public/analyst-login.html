<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analyst Portal Login - FINSPARK</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <a href="index.html" class="brand">
      <span class="brand-icon">⚡</span>
      <span>FINSPARK</span>
    </a>
    <div class="nav-links">
      <a href="login.html" class="btn btn-outline" style="color: #ffffff; border-color: #475569;">User Banking</a>
    </div>
  </nav>

  <main class="container" style="max-width: 420px; margin-top: 3.5rem;">
    <div class="card" style="padding: 2rem;">
      <h2 style="font-size: 1.5rem; color: #0f172a; margin-bottom: 0.25rem; text-align: center;">Analyst Portal</h2>
      <p style="color: #64748b; font-size: 0.85rem; text-align: center; margin-bottom: 1.5rem;">Sign in to access fraud investigation controls</p>

      <div id="analyst-alert" class="alert" style="display:none;"></div>

      <form id="analyst-login-form">
        <div class="form-group">
          <label class="form-label" for="analyst-email">Analyst Email</label>
          <input type="email" id="analyst-email" class="form-input" placeholder="analyst@quantra.com" required value="analyst@quantra.com">
        </div>

        <div class="form-group">
          <label class="form-label" for="analyst-password">Password</label>
          <input type="password" id="analyst-password" class="form-input" placeholder="Enter password" required value="analyst123">
        </div>

        <button type="submit" id="analyst-submit-btn" class="btn btn-primary btn-full" style="padding: 0.75rem; margin-top: 0.5rem;">
          Sign In to Analyst Portal
        </button>
      </form>

      <div style="margin-top: 1.5rem; text-align: center; font-size: 0.8rem; color: #64748b; background: #f8fafc; padding: 0.5rem; border-radius: 4px; border: 1px solid #e2e8f0;">
        Default Credentials: <code>analyst@quantra.com</code> / <code>analyst123</code>
      </div>
    </div>
  </main>

  <footer class="footer">
    FINSPARK — Fraud Investigation Platform
  </footer>

  <script src="js/analyst-login-ui.js"></script>
</body>
</html>
